name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: njangi
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d njangi"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      API_KEY: njangi_dev_123456
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/njangi?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prisma generate
        run: npm run prisma:generate

      - name: Prisma migrate deploy
        run: npm run prisma:migrate:deploy

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
